name: API workflow

on: [push, pull_request]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    name: Test python API
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v2
      with:
        python-version: '3.10'
    - name: Install system dependencies
      run: sudo apt-get update && sudo apt-get install -y libcairo2-dev libcairo2 libgpgme-dev libgpg-error-dev libgpg-error0 libgpgme11 libgpgme11t64 libassuan-dev libassuan0 gpgrt-tools gpgme-json gpg gnupg gpgconf python3-gpg build-essential pkg-config dbus libdbus-1-dev libgirepository1.0-dev
    - name: Install requirements
      run: export PKG_CONFIG_PATH="/usr/lib/x86_64-linux-gnu/pkgconfig:/usr/share/pkgconfig:$PKG_CONFIG_PATH" ; pip install -r api/requirements.txt
    - name: Run tests and collect coverage for calculator
      run: pytest --cov
    - name: Upload coverage reports to Codecov with GitHub Action
      uses: codecov/codecov-action@v5
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      with:
        flags: backend
    - name: Upload test results to Codecov
      if: ${{ !cancelled() }}
      uses: codecov/test-results-action@v1
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
